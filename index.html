<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Factory Cortex — Missing Context Diagnostic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
/* ========== Factory Cortex — design tokens ========== */
:root {
  --bg: #0a0c0e;
  --bg-2: #0d1014;
  --surface: #11161c;
  --surface-2: #161c25;
  --surface-3: #1d2530;
  --border: #232b36;
  --border-strong: #323c4b;
  --text: #f3ebda;
  --text-muted: #8d97a6;
  --text-dim: #5a6473;
  --text-faint: #3b4350;
  --accent: #f0a850;
  --accent-bright: #ffc572;
  --accent-dim: #6e4a23;
  --accent-bg: rgba(240,168,80,0.08);
  --danger: #e07a5f;
  --danger-bg: rgba(224,122,95,0.10);
  --good: #7fb886;
  --good-bg: rgba(127,184,134,0.10);
  --warning: #e8b341;
  --shadow: 0 1px 0 rgba(255,255,255,0.02) inset, 0 24px 60px -28px rgba(0,0,0,0.6);
  --shadow-card: 0 1px 0 rgba(255,255,255,0.025) inset;

  --font-display: 'Inter Tight', 'Inter', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.5;
  font-feature-settings: 'ss01','cv11';
  -webkit-font-smoothing: antialiased;
}
body {
  background:
    radial-gradient(1100px 700px at 80% -10%, rgba(240,168,80,0.06), transparent 60%),
    radial-gradient(900px 600px at -10% 110%, rgba(112,142,200,0.04), transparent 60%),
    var(--bg);
  min-height: 100vh;
}

button { font-family: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
button:disabled { cursor: not-allowed; opacity: 0.5; }

/* ========== App shell ========== */
.app {
  max-width: 1180px;
  margin: 0 auto;
  padding: 28px 28px 80px;
}

/* ========== Top bar ========== */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow);
}
.brand { display: flex; align-items: center; gap: 14px; }
.brand-mark {
  width: 42px; height: 42px;
  border-radius: 9px;
  background:
    linear-gradient(135deg, #2a1f12 0%, #4a3318 60%, #2a1f12 100%);
  border: 1px solid var(--accent-dim);
  display: grid; place-items: center;
  position: relative; overflow: hidden;
}
.brand-mark::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 30% 30%, rgba(255,197,114,0.25), transparent 60%);
}
.brand-mark svg { position: relative; z-index: 1; }
.brand-name { font-family: var(--font-display); font-weight: 800; letter-spacing: 0.06em; font-size: 14.5px; }
.brand-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
.topbar-right { display: flex; gap: 10px; align-items: center; }

/* ========== Pills / chips ========== */
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--surface-2);
  font-size: 12px;
  color: var(--text-muted);
}
.pill b { color: var(--text); font-weight: 600; }
.pill.accent { color: var(--accent); border-color: rgba(240,168,80,0.3); background: var(--accent-bg); }
.pill.accent b { color: var(--accent-bright); }
.pill.good { color: var(--good); border-color: rgba(127,184,134,0.3); background: var(--good-bg); }
.pill.danger { color: var(--danger); border-color: rgba(224,122,95,0.3); background: var(--danger-bg); }

/* ========== Section title row ========== */
.section-title {
  display: flex; align-items: center; justify-content: space-between;
  margin: 22px 4px 10px;
}
.section-title .label {
  font-size: 12px; color: var(--text-muted); letter-spacing: 0.04em;
}
.section-title .hint { display: flex; gap: 8px; }

/* ========== Progress bar ========== */
.progress-track {
  height: 6px;
  background: var(--surface-2);
  border-radius: 999px;
  overflow: hidden;
  margin: 12px 4px 24px;
  border: 1px solid var(--border);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent-bright) 100%);
  border-radius: 999px;
  transition: width 700ms cubic-bezier(.22,.61,.36,1);
}

/* ========== Card ========== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  box-shadow: var(--shadow-card);
}
.card + .card { margin-top: 14px; }
.card-title {
  font-size: 11px; letter-spacing: 0.14em; color: var(--text-muted);
  text-transform: uppercase; margin-bottom: 14px;
}

/* ========== HERO (the question, front and center) ========== */
.hero-card {
  background:
    radial-gradient(900px 320px at 10% -10%, rgba(240,168,80,0.07), transparent 60%),
    var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 30px 34px 32px;
  position: relative;
  margin-bottom: 14px;
  box-shadow: var(--shadow-card);
}
.hero-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 22px;
  display: flex; align-items: center; gap: 10px;
}
.hero-scene-id { color: var(--accent); }
.hero-dot { color: var(--text-faint); }
.hero-scene-label { color: var(--text); }
.hero-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 36px;
  align-items: start;
}
.hero-question-block { min-width: 0; }
.hero-eyebrow {
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.hero-question {
  font-family: var(--font-display);
  font-size: 40px;
  font-weight: 700;
  line-height: 1.12;
  letter-spacing: -0.02em;
  margin: 0 0 18px;
  max-width: 720px;
  text-wrap: balance;
  color: var(--text);
}
.hero-narrative {
  color: var(--text-muted);
  max-width: 680px;
  font-size: 14.5px;
  line-height: 1.65;
  margin: 0;
  padding-left: 14px;
  border-left: 2px solid var(--border-strong);
}

/* ========== Support row: live KPIs + missing context ========== */
.support-row {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}
.kpi-strip, .missing-strip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
}
.kpi-strip-label, .missing-strip-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.kpi-strip-tiles {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.kpi-strip-tile {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  display: flex; flex-direction: column; gap: 2px;
}
.kpi-strip-tile .l {
  font-size: 10px; color: var(--text-muted);
  letter-spacing: 0.1em; text-transform: uppercase;
}
.kpi-strip-tile .v {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.01em;
  color: var(--text);
}
.kpi-strip-tile .u {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 400;
}
.kpi-strip-tile.accent {
  background: var(--accent-bg);
  border-color: rgba(240,168,80,0.3);
}
.kpi-strip-tile.accent .v { color: var(--accent-bright); }
.kpi-strip-tile.accent .l { color: var(--accent); }

.missing-strip-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.missing-tag {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.05em;
  color: var(--accent);
  background: var(--accent-bg);
  border: 1px solid rgba(240,168,80,0.25);
  padding: 5px 10px;
  border-radius: 6px;
  text-transform: uppercase;
}

/* ========== Evidence disclosure ========== */
.evidence-disclosure {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 16px;
  overflow: hidden;
}
.evidence-disclosure > summary {
  list-style: none;
  cursor: pointer;
  padding: 14px 20px;
  display: flex; justify-content: space-between; align-items: center;
  user-select: none;
}
.evidence-disclosure > summary::-webkit-details-marker { display: none; }
.evidence-sum-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.evidence-sum-label::before {
  content: '▾';
  color: var(--text-muted);
  margin-right: 10px;
  display: inline-block;
  transition: transform 200ms ease;
}
.evidence-disclosure:not([open]) .evidence-sum-label::before {
  transform: rotate(-90deg);
}
.evidence-sum-hint {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
}
.evidence-disclosure[open] .evidence-sum-hint::after { content: ''; }
.evidence-disclosure .evidence-grid {
  padding: 0 20px 20px;
}

/* ========== Choices block ========== */
.choices-block {
  background:
    linear-gradient(180deg, rgba(240,168,80,0.03), transparent 30%),
    var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px 24px 18px;
  box-shadow: 0 -4px 30px -10px rgba(240,168,80,0.04);
}
.choices-block-head {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 16px;
  gap: 20px;
}
.choices-block-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.choices-block-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.015em;
  color: var(--text);
}
.choices-block-hint {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  text-align: right;
}

/* ========== Countdown ring ========== */
.countdown {
  width: 116px; height: 116px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 14px;
  display: grid; place-items: center;
  position: relative;
}
.countdown-svg { transform: rotate(-90deg); }
.countdown-num {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -56%);
  font-family: var(--font-display);
  font-size: 30px; font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}
.countdown-label {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 9px; letter-spacing: 0.14em;
  color: var(--text-muted);
  text-transform: uppercase;
  white-space: nowrap;
}
.countdown.warning .countdown-num { color: var(--accent-bright); }
.countdown.danger .countdown-num { color: var(--danger); }
.countdown.danger { animation: pulse 0.9s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(224,122,95,0); }
  50% { box-shadow: 0 0 0 6px rgba(224,122,95,0.08); }
}

/* ========== Context panel (evidence) ========== */
.evidence-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.evidence-block {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 18px 20px;
  position: relative;
}
.evidence-block h4 {
  font-family: var(--font-display);
  font-size: 15.5px; font-weight: 700;
  margin: 0 0 12px;
  letter-spacing: -0.01em;
}
.evidence-block .tag {
  position: absolute; top: 18px; right: 18px;
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.14em;
  color: var(--text-dim);
  text-transform: uppercase;
}
.evidence-list { list-style: none; padding: 0; margin: 0; }
.evidence-list li {
  font-size: 13px;
  color: var(--text);
  padding: 5px 0 5px 16px;
  position: relative;
  line-height: 1.55;
}
.evidence-list li::before {
  content: '';
  position: absolute;
  left: 0; top: 12px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
}
.evidence-list li.missing::before { background: var(--text-faint); }
.evidence-list li.missing { color: var(--text-muted); }
.evidence-list li.missing em { font-style: normal; color: var(--text-dim); }

/* ========== Choices ========== */
.choices-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.choice {
  text-align: left;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 18px 20px 16px;
  transition: border-color 160ms ease, background 160ms ease, transform 120ms ease;
  position: relative;
}
.choice:hover:not(:disabled) {
  border-color: var(--accent-dim);
  background: linear-gradient(180deg, rgba(240,168,80,0.05), transparent), var(--surface-2);
}
.choice:active:not(:disabled) { transform: translateY(1px); }
.choice.selected {
  border-color: var(--accent);
  background: var(--accent-bg);
  box-shadow: 0 0 0 1px var(--accent) inset, 0 0 30px -10px rgba(240,168,80,0.3);
}
.choice .label {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.16em;
  color: var(--text-muted); text-transform: uppercase;
  margin-bottom: 10px;
  display: flex; justify-content: space-between;
}
.choice .label .kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  background: var(--surface-3);
  border: 1px solid var(--border-strong);
  padding: 1px 6px;
  border-radius: 4px;
  color: var(--text-muted);
}
.choice.selected .label { color: var(--accent); }
.choice.selected .label .kbd { color: var(--accent); border-color: var(--accent); background: rgba(240,168,80,0.15); }
.choice .text {
  font-family: var(--font-display);
  font-size: 16px; font-weight: 600;
  line-height: 1.35;
  margin: 0 0 8px;
  letter-spacing: -0.005em;
  color: var(--text);
}
.choice .tradeoff {
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.5;
}
.choice .preview {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
  display: flex; gap: 10px; flex-wrap: wrap;
  opacity: 0; max-height: 0; overflow: hidden;
  transition: opacity 180ms ease;
}
.choice:hover .preview { opacity: 1; max-height: 80px; }
.choice .preview .chip {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 5px;
  background: var(--surface-3);
  color: var(--text-muted);
}
.choice .preview .chip.up { color: var(--good); }
.choice .preview .chip.down { color: var(--danger); }

/* ========== Commit bar ========== */
.commit-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 16px;
  padding: 14px 4px 0;
}
.commit-hint {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}
.btn {
  padding: 11px 22px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 14px;
  background: var(--surface-3);
  border: 1px solid var(--border-strong);
  color: var(--text);
  transition: background 160ms ease, border-color 160ms ease;
  font-family: var(--font-display);
  letter-spacing: -0.005em;
}
.btn:hover:not(:disabled) { background: var(--surface-2); }
.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #1a1308;
}
.btn.primary:hover:not(:disabled) { background: var(--accent-bright); border-color: var(--accent-bright); }
.btn.ghost { background: transparent; border-color: var(--border); }

/* ========== Intro screen ========== */
.intro {
  min-height: 78vh;
  display: grid;
  place-items: center;
  text-align: left;
}
.intro-inner {
  max-width: 760px;
  width: 100%;
}
.intro-eyebrow {
  font-family: var(--font-mono);
  font-size: 12px; letter-spacing: 0.18em;
  color: var(--accent); text-transform: uppercase;
  margin-bottom: 22px;
}
.intro h1 {
  font-family: var(--font-display);
  font-size: 72px;
  line-height: 1.02;
  letter-spacing: -0.03em;
  margin: 0 0 22px;
  font-weight: 800;
  text-wrap: balance;
}
.intro h1 em { font-style: normal; color: var(--accent); }
.intro-lede {
  font-size: 18px; color: var(--text-muted);
  line-height: 1.55; max-width: 580px;
  margin-bottom: 36px;
}
.intro-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 40px;
}
.intro-stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 16px 18px;
}
.intro-stat .v {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 700;
  letter-spacing: -0.01em;
}
.intro-stat .l {
  font-size: 11px; color: var(--text-muted);
  letter-spacing: 0.12em; text-transform: uppercase;
  margin-top: 6px;
}
.intro-rules {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
  margin-bottom: 36px;
}
.intro-rule {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 18px 20px;
}
.intro-rule .n {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.12em;
  margin-bottom: 8px;
}
.intro-rule h4 {
  font-family: var(--font-display);
  font-size: 15px; font-weight: 700;
  margin: 0 0 6px;
}
.intro-rule p { color: var(--text-muted); font-size: 13px; line-height: 1.5; margin: 0; }
.intro-cta {
  display: flex; gap: 12px; align-items: center;
}

/* ========== Reveal modal ========== */
.reveal-backdrop {
  position: fixed; inset: 0;
  background: rgba(6,8,10,0.78);
  backdrop-filter: blur(6px);
  display: grid; place-items: center;
  z-index: 50;
  padding: 28px;
  animation: fade 260ms ease;
}
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.reveal {
  max-width: 760px; width: 100%;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: 16px;
  padding: 36px 38px;
  box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6);
  animation: rise 360ms cubic-bezier(.22,.61,.36,1);
}
@keyframes rise { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.reveal-verdict {
  display: inline-flex;
  align-items: center; gap: 8px;
  padding: 6px 12px;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 18px;
}
.reveal-verdict.strong { background: var(--good-bg); color: var(--good); border: 1px solid rgba(127,184,134,0.3); }
.reveal-verdict.okay   { background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(240,168,80,0.3); }
.reveal-verdict.weak   { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(224,122,95,0.3); }
.reveal h2 {
  font-family: var(--font-display);
  font-size: 30px; font-weight: 800;
  line-height: 1.1; letter-spacing: -0.02em;
  margin: 0 0 18px;
}
.reveal .what-happened {
  color: var(--text);
  font-size: 15px; line-height: 1.6;
  margin: 0 0 22px;
}
.reveal .truth-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 18px 20px;
  margin-bottom: 22px;
  border-left: 3px solid var(--accent);
}
.reveal .truth-card .label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.reveal .truth-card p {
  margin: 0;
  font-size: 14px; line-height: 1.6; color: var(--text);
}

const START_KPIS = { out: 85, qual: 80, str: 95, ctx: 45 };

function archetypeFor(finalKpis, choices) {
  const ctx = finalKpis.ctx;
  const strongCount = choices.filter(c => c === 'strong').length;
  const weakCount = choices.filter(c => c === 'weak').length;

  if (ctx >= 130 || strongCount >= 5) {
    return {
      grade: 'A',
      title: "The Context Operator",
      desc: "You treat invisible signals as data. You asked the question that the dashboard couldn't answer. Your shift handovers will be cleaner than your peers' all-hands meetings. Watch for the inverse failure mode: spending so long verifying that you let the trend get ahead of you."
    };
  }
  if (ctx >= 100 || strongCount >= 4) {
    return {
      grade: 'B',
      title: "The Calibrated Pragmatist",
      desc: "You weighted human signals heavily, sometimes after the second prompt. You'll catch most things in time and pay slightly more than the optimal price for it. Closing the gap is small, mostly habit: ask the cheap question first, every time."
    };
  }
  if (ctx >= 70 || (strongCount >= 2 && weakCount <= 2)) {
    return {
      grade: 'C',
      title: "The Dashboard Driver",
      desc: "You trust what the system shows you, and you don't trust what only one person felt. That's defensible most of the time and catastrophic the rest. The fastest upgrade in your operating system is treating an experienced operator's 'something feels off' as a real signal, not a soft one."
    };
  }
  if (ctx >= 40) {
    return {
      grade: 'D',
      title: "The Output Defender",
      desc: "You protected the number on the screen and let the underneath drift. Most days that posture works, until it doesn't, and then the bill arrives all at once. The pattern to break: every time you choose 'keep running,' write down what would prove you wrong. Then go look for it."
    };
  }
  return {
    grade: 'F',
    title: "The Sleepwalker",
    desc: "Today you optimized for friction avoidance over everything else — including safety, traceability, and the trust of the operators standing two meters away from you. Industrial leadership at this level is genuinely a different job from the one you played in this simulation. The next plant tour will feel different now."
  };
}

function CountdownRing({ value, max }) {
  const pct = Math.max(0, Math.min(1, value / max));
  const r = 42, c = 2 * Math.PI * r;
  const tone = value <= 8 ? 'danger' : value <= 18 ? 'warning' : '';
  return (
    <div className={`countdown ${tone}`}>
      <svg className="countdown-svg" width="108" height="108" viewBox="0 0 108 108">
        <circle cx="54" cy="54" r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="5"/>
        <circle cx="54" cy="54" r={r} fill="none"
          stroke={tone === 'danger' ? '#e07a5f' : '#f0a850'}
          strokeWidth="5"
          strokeLinecap="round"
          strokeDasharray={c}
          strokeDashoffset={c * (1 - pct)}
          style={{ transition: 'stroke-dashoffset 900ms linear, stroke 240ms ease' }}/>
      </svg>
      <div className="countdown-num">{Math.max(0, Math.ceil(value))}</div>
      <div className="countdown-label">SECONDS LEFT</div>
    </div>
  );
}

function EvidenceCard({ block }) {
  return (
    <div className="evidence-block">
      <h4>{block.title}</h4>
      <span className="tag">{block.tag}</span>
      <ul className="evidence-list">
        {block.items.map((it, i) => (
          <li key={i} className={it.missing ? 'missing' : ''}>{it.t}</li>
        ))}
      </ul>
    </div>
  );
}

function ChoiceCard({ choice, index, selected, onClick, disabled }) {
  const d = choice.delta;
  const chips = [
    { l: 'Output',  v: d.out  },
    { l: 'Quality', v: d.qual },
    { l: 'Stress',  v: d.str, invert: true },
    { l: 'Context', v: d.ctx  },
  ];
  return (
    <button
      className={`choice ${selected ? 'selected' : ''}`}
      onClick={onClick}
      disabled={disabled}
      aria-pressed={selected}
    >
      <div className="label">
        <span>Choice {index + 1}</span>
        <span className="kbd">{index + 1}</span>
      </div>
      <div className="text">{choice.text}</div>
      <div className="tradeoff">{choice.tradeoff}</div>
      <div className="preview">
        {chips.map(ch => {
          const good = ch.invert ? ch.v < 0 : ch.v > 0;
          const bad  = ch.invert ? ch.v > 0 : ch.v < 0;
          return (
            <span key={ch.l} className={`chip ${good ? 'up' : bad ? 'down' : ''}`}>
              {ch.l} {ch.v > 0 ? '+' : ''}{ch.v}
            </span>
          );
        })}
      </div>
    </button>
  );
}

          <div className="intro-rule">
            <div className="n">01</div>
            <h4>Read the gaps, not just the data</h4>
            <p>Each scene marks what's <em>missing</em> as clearly as what's known. Most of the answer lives in the gaps.</p>
          </div>
          <div className="intro-rule">
            <div className="n">02</div>
            <h4>Decide under pressure</h4>
            <p>Each scene has a hard timer. If you don't pick, the system picks the lowest-context option for you.</p>
          </div>
          <div className="intro-rule">
            <div className="n">03</div>
            <h4>See what you couldn't</h4>
            <p>After every decision, we reveal the hidden context — the actual answer behind the choice.</p>
          </div>
        </div>
        <div className="intro-cta">
          <button className="btn primary" onClick={onStart} autoFocus>
            Begin diagnostic →
          </button>
          <span className="dim" style={{fontSize: 13}}>Keyboard: 1–4 select · Enter commit.</span>
        </div>
      </div>
    </div>
  );
}

function SceneScreen({ scene, sceneIndex, totalScenes, kpis, onCommit, frozen }) {
  const [selected, setSelected] = useState(null);
  const [remaining, setRemaining] = useState(scene.timer);
  const tickRef = useRef(null);
  const startRef = useRef(Date.now());
  const committedRef = useRef(false);

  useEffect(() => {
    setSelected(null);
    setRemaining(scene.timer);
    startRef.current = Date.now();
    committedRef.current = false;
  }, [scene.id]);

  useEffect(() => {
    if (frozen) return;
    if (tickRef.current) clearInterval(tickRef.current);
    tickRef.current = setInterval(() => {
      const elapsed = (Date.now() - startRef.current) / 1000;
      const r = Math.max(0, scene.timer - elapsed);
      setRemaining(r);
      if (r <= 0 && !committedRef.current) {
        clearInterval(tickRef.current);
        committedRef.current = true;
        const worstIdx = scene.choices
          .map((c, i) => ({ i, ctx: c.delta.ctx }))
          .sort((a, b) => a.ctx - b.ctx)[0].i;
        onCommit(worstIdx, true);
      }
    }, 100);
    return () => clearInterval(tickRef.current);
  }, [scene.id, frozen]);

  useEffect(() => {
    if (frozen) return;
    function onKey(e) {
      if (['1','2','3','4'].includes(e.key)) {
        const idx = parseInt(e.key) - 1;
        if (idx < scene.choices.length) setSelected(idx);
      } else if (e.key === 'Enter') {
        setSelected(s => {
          if (s != null && !committedRef.current) {
            committedRef.current = true;
            clearInterval(tickRef.current);
            onCommit(s, false);
          }
          return s;
        });
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [scene.id, frozen]);

  function commit() {
    if (selected == null || committedRef.current) return;
    committedRef.current = true;
    clearInterval(tickRef.current);
    onCommit(selected, false);
  }

  const progressPct = (sceneIndex / totalScenes) * 100;
  const progressInScene = frozen ? (1 / totalScenes) * 100 : ((1 - remaining / scene.timer) / totalScenes) * 100;
  const kbd = {fontFamily:'var(--font-mono)',background:'var(--surface-3)',border:'1px solid var(--border-strong)',padding:'1px 6px',borderRadius:4,marginInline:3,fontSize:11};

  return (
    <>
      <TopBar scene={sceneIndex + 1} totalScenes={totalScenes} ctx={kpis.ctx} />
      <div className="progress-track">
        <div className="progress-fill" style={{ width: `${progressPct + progressInScene}%` }}/>
      </div>

      {/* Support row: KPIs + missing context — above the question */}
      <div className="support-row">
        <div className="kpi-strip">
          <div className="kpi-strip-label">Live state</div>
          <div className="kpi-strip-tiles">
            <div className="kpi-strip-tile"><span className="l">Output</span><span className="v">{Math.round(kpis.out)}</span></div>
            <div className="kpi-strip-tile"><span className="l">Quality</span><span className="v">{Math.round(kpis.qual)}</span></div>
            <div className="kpi-strip-tile"><span className="l">Stress</span><span className="v">{Math.round(kpis.str)}<span className="u"> BPM</span></span></div>
            <div className="kpi-strip-tile accent"><span className="l">Context</span><span className="v">{Math.round(kpis.ctx)}</span></div>
          </div>
        </div>
        <div className="missing-strip">
          <div className="missing-strip-label">What you don't know</div>
          <div className="missing-strip-tags">
            {scene.breadcrumb.map((b, i) => (
              <span key={i} className="missing-tag">{b.replace(/^MISSING /, '')}</span>
            ))}
          </div>
        </div>
      </div>

      {/* Hero: the question, front and center */}
      <div className="hero-card">
        <div className="hero-meta">
          <span className="hero-scene-id">Scene {sceneIndex + 1} of {totalScenes}</span>
          <span className="hero-dot">·</span>
          <span className="hero-scene-label">{scene.label}</span>
        </div>
        <div className="hero-row">
          <div className="hero-question-block">
            <div className="hero-eyebrow">The decision</div>
            <h1 className="hero-question">{scene.prompt}</h1>
            <p className="hero-narrative">{scene.narrative}</p>
          </div>
          <CountdownRing value={frozen ? scene.timer : remaining} max={scene.timer} />
        </div>
      </div>

      {/* Scrollable zone: evidence + choices, no page scroll on mobile */}
      <div className="scene-scroll-area">
        <details className="evidence-disclosure">
          <summary>
            <span className="evidence-sum-label">Evidence — read before choosing</span>
            <span className="evidence-sum-hint">{scene.machine.items.length + scene.operator.items.length} signals</span>
          </summary>
          <div className="evidence-grid">
            <EvidenceCard block={scene.machine} />
            <EvidenceCard block={scene.operator} />
          </div>
        </details>

      <div className="choices-block">
        <div className="choices-block-head">
          <div className="choices-block-hint desktop-hint">
            <kbd style={kbd}>1</kbd>–<kbd style={kbd}>4</kbd> select · <kbd style={kbd}>Enter</kbd> commit · hover for impact
          </div>
          <div className="choices-block-hint mobile-hint" style={{display:'none'}}>
            Tap to select · tap again to commit
          </div>
        </div>
        <div className="choices-grid">
          {scene.choices.map((c, i) => (
            <ChoiceCard
              key={i}
              choice={c}
              index={i}
              selected={selected === i}
              onClick={() => {
                if (frozen) return;
                if (selected === i) { commit(); } // tap again = commit
                else setSelected(i);
              }}
              disabled={frozen}
            />
          ))}
        </div>
        <div className="commit-bar">
          <div className="commit-hint">
            {frozen ? "Decision locked in." : selected == null ? "Select a choice to continue" : `Choice ${selected + 1} selected · tap again or press commit`}
          </div>
          {!frozen && (
            <button className="btn primary" onClick={commit} disabled={selected == null}>
              Commit decision →
            </button>
          )}
        </div>
      </div>
      </div>{/* end scene-scroll-area */}
    </>
  );
}

function RevealModal({ scene, choiceIndex, kpisBefore, kpisAfter, timedOut, onNext, isLast }) {
  const choice = scene.choices[choiceIndex];
  const verdictLabel = { strong: 'Strong call', okay: 'Defensible', weak: 'Costly call' }[choice.verdict];
  const deltas = {
    out:  kpisAfter.out  - kpisBefore.out,
    qual: kpisAfter.qual - kpisBefore.qual,
    str:  kpisAfter.str  - kpisBefore.str,
    ctx:  kpisAfter.ctx  - kpisBefore.ctx,
  };

  useEffect(() => {
    function onKey(e) { if (e.key === 'Enter') onNext(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  function deltaCell(label, value, unit, delta, invert) {
    const sign = delta > 0 ? '+' : '';
    const dirGood = invert ? delta < 0 : delta > 0;
    const dirBad  = invert ? delta > 0 : delta < 0;
    const cls = dirGood ? 'up' : dirBad ? 'down' : '';
    return (
      <div className="reveal-kpi" key={label}>
        <div className="l">{label}</div>
        <div className="v">
          {Math.round(value)}<span style={{fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)'}}>{unit}</span>
          <span className={`d ${cls}`}>{sign}{Math.round(delta)}</span>
        </div>
      </div>
    );
  }

  return (
    <div className="reveal-backdrop">
      <div className="reveal">
        <div className={`reveal-verdict ${choice.verdict}`}>
          <span style={{width:6,height:6,borderRadius:'50%',background:'currentColor',flexShrink:0}}/>
          {timedOut ? "Timed out — defaulted to lowest-context option" : verdictLabel}
        </div>
        <h2>You chose: <span style={{color:'var(--accent)'}}>"{choice.text}"</span></h2>
        <p className="what-happened">{choice.what}</p>
        <div className="truth-card">
          <div className="label">{choice.truthLabel}</div>
          <p>{choice.truth}</p>
        </div>
        <div className="reveal-kpis">
          {deltaCell('Output', kpisAfter.out, '/100', deltas.out, false)}
          {deltaCell('Quality', kpisAfter.qual, '/100', deltas.qual, false)}
          {deltaCell('Stress', kpisAfter.str, ' BPM', deltas.str, true)}
          {deltaCell('Context', kpisAfter.ctx, '/100', deltas.ctx, false)}
        </div>
        <div className="commit-bar" style={{marginTop: 0, paddingTop: 0}}>
          <div className="commit-hint">Press <kbd style={{fontFamily:'var(--font-mono)',background:'var(--surface-3)',border:'1px solid var(--border-strong)',padding:'1px 6px',borderRadius:4}}>Enter</kbd> to continue</div>
          <button className="btn primary" onClick={onNext} autoFocus>
            {isLast ? "See your diagnostic →" : "Next scene →"}
          </button>
        </div>
      </div>
    </div>
  );
}

function ResultScreen({ kpisFinal, kpisStart, choiceVerdicts, choiceIndices, onRestart }) {
  const arch = archetypeFor(kpisFinal, choiceVerdicts);
  const rows = [
    { l: 'Output',  v: kpisFinal.out,  pct: kpisFinal.out,  unit: '/100', delta: kpisFinal.out  - kpisStart.out },
    { l: 'Quality', v: kpisFinal.qual, pct: kpisFinal.qual, unit: '/100', delta: kpisFinal.qual - kpisStart.qual },
    { l: 'Stress',  v: kpisFinal.str,  pct: 100 - Math.min(100, (kpisFinal.str - 60) * 1.4), unit: ' BPM', delta: kpisFinal.str - kpisStart.str, invert: true },
    { l: 'Context Integrity', v: kpisFinal.ctx, pct: kpisFinal.ctx, unit: '/100', delta: kpisFinal.ctx - kpisStart.ctx },
  ];
  const [pcts, setPcts] = useState(rows.map(() => 0));
  useEffect(() => {
    const t = setTimeout(() => setPcts(rows.map(r => Math.max(0, Math.min(100, r.pct)))), 100);
    return () => clearTimeout(t);
  }, []);

  return (
    <div className="result">
      <TopBar scene={null} totalScenes={6} ctx={kpisFinal.ctx} />
      <div className="section-title">
        <span className="label">Diagnostic complete · 6 of 6 scenes</span>
        <div className="hint">
          <span className="pill accent"><span>Grade</span><b>{arch.grade}</b></span>
        </div>
      </div>
      <div className="result-grade-row">
        <div className="grade-card">
          <div className="letter">{arch.grade}</div>
          <div className="label">Final Grade</div>
        </div>
        <div className="archetype-card">
          <div className="eyebrow">Your operating archetype</div>
          <h2>{arch.title}</h2>
          <p>{arch.desc}</p>
        </div>
      </div>
      <div className="result-kpis">
        {rows.map((r, i) => (
          <div className="result-kpi" key={r.l}>
            <div className="l">{r.l}</div>
            <div className="v">{Math.round(r.v)}<span style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--text-muted)'}}>{r.unit}</span></div>
            <div className="bar"><span style={{ width: `${pcts[i]}%` }}/></div>
            <div className="delta">
              {r.delta > 0 ? '+' : ''}{Math.round(r.delta)} from start
              {r.invert && r.delta > 0 && <span style={{color:'var(--danger)'}}> · elevated</span>}
              {r.invert && r.delta <= 0 && <span style={{color:'var(--good)'}}> · contained</span>}
            </div>
          </div>
        ))}
      </div>
      <div className="result-debrief">
        <h3>Your six decisions</h3>
        <div className="sub">A short read on each call, in the order you made them.</div>
        <ul>
          {SCENES.map((sc, i) => {
            const v = choiceVerdicts[i];
            const idx = choiceIndices[i];
            const chosen = sc.choices[idx];
            const verdictText = v === 'strong' ? 'Strong call' : v === 'okay' ? 'Defensible' : 'Costly call';
            const verdictColor = v === 'strong' ? 'var(--good)' : v === 'okay' ? 'var(--accent)' : 'var(--danger)';
            return (
              <li key={sc.id}>
                <div className="num">S{i+1}</div>
                <div>
                  <span className="scene-name">{sc.label} <span style={{color: verdictColor}}>· {verdictText}</span></span>
                  <div><strong style={{color:'var(--text)'}}>"{chosen.text}"</strong></div>
                  <div style={{color:'var(--text-muted)', fontSize: 13, marginTop: 4}}>{chosen.truth}</div>
                </div>
              </li>
            );
          })}
        </ul>
      </div>
      {/* Book a call CTA */}
      <div className="book-call-card">
        <div className="book-call-content">
          <div className="book-call-eyebrow">Want to apply this to your plant?</div>
          <h3>Book a 30-minute diagnostic call</h3>
          <p>Talk through your factory's context gaps with an industrial ops specialist — and find out what's really hiding in your blind spots.</p>
        </div>
        <a
          href="https://tidycal.com/lesykua/30-minute-meeting-factory-cortex"
          target="_blank"
          rel="noopener noreferrer"
          className="btn book-call-btn"
        >
          Book a call →
        </a>
      </div>

      <div className="result-cta">
        <div className="share-card">
          <span style={{color:'var(--accent)'}}>◆</span>
          Factory Cortex · Grade <b style={{color:'var(--text)'}}>{arch.grade}</b> · Context Integrity <b style={{color:'var(--text)'}}>{Math.round(kpisFinal.ctx)}/100</b> · "{arch.title}"
        </div>
        <button className="btn primary" onClick={onRestart}>Run again →</button>
      </div>
    </div>
  );
}

/* ========== App ========== */

function clampKpis(k) {
  return {
    out:  Math.max(0, Math.min(100, k.out)),
    qual: Math.max(0, Math.min(100, k.qual)),
    str:  Math.max(50, Math.min(160, k.str)),
    ctx:  Math.max(0, Math.min(150, k.ctx)),
  };
}

function App() {
  const [phase, setPhase] = useState('intro');
  const [sceneIdx, setSceneIdx] = useState(0);
  const [kpis, setKpis] = useState({ ...START_KPIS });
  const [kpisBefore, setKpisBefore] = useState({ ...START_KPIS });
  const [choiceIdx, setChoiceIdx] = useState(null);
  const [timedOut, setTimedOut] = useState(false);
  const [history, setHistory] = useState([]);

  const scene = SCENES[sceneIdx];

  function start() {
    setPhase('scene');
    setSceneIdx(0);
    setKpis({ ...START_KPIS });
    setKpisBefore({ ...START_KPIS });
    setHistory([]);
    setChoiceIdx(null);
  }

  function onCommit(idx, didTimeOut) {
    const ch = scene.choices[idx];
    const before = { ...kpis };
    const after = clampKpis({
      out:  kpis.out  + ch.delta.out,
      qual: kpis.qual + ch.delta.qual,
      str:  kpis.str  + ch.delta.str,
      ctx:  kpis.ctx  + ch.delta.ctx,
    });
    setKpisBefore(before);
    setKpis(after);
    setChoiceIdx(idx);
    setTimedOut(didTimeOut);
    setHistory(h => [...h, { verdict: ch.verdict, choice: idx }]);
    setPhase('reveal');
  }

  function onNext() {
    if (sceneIdx >= SCENES.length - 1) {
      setPhase('end');
    } else {
      setSceneIdx(i => i + 1);
      setPhase('scene');
    }
  }

  return (
    <div className="app">
      {phase === 'intro' && (
        <>
          <TopBar />
          <IntroScreen onStart={start} />
        </>
      )}

      {phase === 'scene' && scene && (
        <SceneScreen
          scene={scene}
          sceneIndex={sceneIdx}
          totalScenes={SCENES.length}
          kpis={kpis}
          onCommit={onCommit}
          frozen={false}
        />
      )}

      {phase === 'reveal' && scene && (
        <>
          <SceneScreen
            scene={scene}
            sceneIndex={sceneIdx}
            totalScenes={SCENES.length}
            kpis={kpisBefore}
            onCommit={() => {}}
            frozen={true}
          />
          <RevealModal
            scene={scene}
            choiceIndex={choiceIdx}
            kpisBefore={kpisBefore}
            kpisAfter={kpis}
            timedOut={timedOut}
            onNext={onNext}
            isLast={sceneIdx >= SCENES.length - 1}
          />
        </>
      )}

      {phase === 'end' && (
        <ResultScreen
          kpisFinal={kpis}
          kpisStart={START_KPIS}
          choiceVerdicts={history.map(h => h.verdict)}
          choiceIndices={history.map(h => h.choice)}
          onRestart={start}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
